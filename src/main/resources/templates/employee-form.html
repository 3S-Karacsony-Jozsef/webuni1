<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Create Employee</title>
  </head>
  <body>
    <h1>Create New Employee</h1>
    <form
      action="#"
      th:action="@{/employees}"
      th:object="${employee}"
      method="post"
    >
      <label>Name:</label>
      <input type="text" th:field="*{name}" /><br />
      <label>Position:</label>
      <input type="text" th:field="*{position}" /><br />
      <label>Salary:</label>
      <input type="number" th:field="*{salary}" /><br />
      <label>Start Date (YYYY-MM-DDTHH:MM:SS):</label>
      <input type="text" th:field="*{startDate}" /><br />
      <button type="submit">Save</button>
    </form>
    <a href="/employees">Back to list</a>
  </body>
</html>
