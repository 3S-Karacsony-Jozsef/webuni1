<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Employee List</title>
  </head>
  <body>
    <h1>Employees</h1>
    <a href="/employees/new">Add New Employee</a>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Position</th>
          <th>Salary</th>
          <th>Start Date</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="emp : ${employees}">
          <td th:text="${emp.id}">1</td>
          <td th:text="${emp.name}">John</td>
          <td th:text="${emp.position}">Engineer</td>
          <td th:text="${emp.salary}">1000</td>
          <td th:text="${emp.startDate}">2020-01-01</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
